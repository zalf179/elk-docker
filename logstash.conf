input {
  beats {
    port => 5044
  }
}

filter {
  # ==========================================
  # 1. FILTER NGINX (Access & Error)
  # ==========================================
  if [event][module] == "nginx" {
    if [fileset][name] == "access" {
      grok {
        match => { "message" => ["%{IPORHOST:remote_ip} - %{DATA:user_name} \[%{HTTPDATE:access_time}\] \"%{WORD:http_method} %{DATA:url} HTTP/%{NUMBER:http_version}\" %{NUMBER:response_code} %{NUMBER:body_sent_bytes} \"%{DATA:referrer}\" \"%{DATA:user_agent}\""] }
      }
      mutate {
        add_tag => ["nginx_access_parsed"]
        convert => { "response_code" => "integer" "body_sent_bytes" => "integer" }
      }
    }
    else if [fileset][name] == "error" {
      grok {
        match => { "message" => ["(?<timestamp>%{YEAR}/%{MONTHNUM}/%{MONTHDAY} %{TIME}) \[%{LOGLEVEL:severity}\] %{POSINT:pid}#%{NUMBER:tid}: %{GREEDYDATA:error_message}(?:, client: %{IPORHOST:remote_ip})?(?:, server: %{IPORHOST:server})?(?:, request: \"%{WORD:http_method} %{DATA:url} HTTP/%{NUMBER:http_version}\")?(?:, host: \"%{IPORHOST:host}\")?"] }
      }
      mutate { add_tag => ["nginx_error_parsed"] }
    }
  }

  # ==========================================
  # 2. FILTER SSH / AUTH LOG (The Ultimate Patch)
  # ==========================================
  else if [event][dataset] == "system.auth" or [log][file][path] =~ "auth.log" {
    grok {
      match => { "message" => [
        # A. PAM More Failures (Log terbaru lo)
        "%{TIMESTAMP_ISO8601:ssh_ts} %{HOSTNAME:h} sshd\[%{POSINT:pid}\]: PAM %{GREEDYDATA:ssh_event};.*rhost=%{IPORHOST:ssh_ip}.*user=%{USER:ssh_user}",

        # B. Connection reset
        "%{TIMESTAMP_ISO8601:ssh_ts} %{HOSTNAME:h} sshd\[%{POSINT:pid}\]: Connection reset by authenticating user %{USER:ssh_user} %{IPORHOST:ssh_ip} port %{POSINT:ssh_port} \[%{DATA:ssh_stage}\]",

        # C. Invalid User
        "%{TIMESTAMP_ISO8601:ssh_ts} %{HOSTNAME:h} sshd\[%{POSINT:pid}\]: Invalid user %{USER:ssh_user} from %{IPORHOST:ssh_ip} port %{POSINT:ssh_port}",

        # D. Failed password
        "%{TIMESTAMP_ISO8601:ssh_ts} %{HOSTNAME:h} sshd\[%{POSINT:pid}\]: Failed password for (invalid user )?%{USER:ssh_user} from %{IPORHOST:ssh_ip} port %{POSINT:ssh_port} ssh2",

        # E. Accepted password (Login Berhasil)
        "%{TIMESTAMP_ISO8601:ssh_ts} %{HOSTNAME:h} sshd\[%{POSINT:pid}\]: Accepted password for %{USER:ssh_user} from %{IPORHOST:ssh_ip} port %{POSINT:ssh_port} ssh2"
      ] }
    }

    if "_grokparsefailure" not in [tags] {
      mutate {
        add_tag => ["ssh_auth_parsed"]
        remove_tag => ["_grokparsefailure"]
      }
    }
  }

  # ==========================================
  # 3. CLEANUP & OPTIMIZATION
  # ==========================================
  if "_grokparsefailure" not in [tags] {
    mutate {
      remove_field => ["@version", "agent", "ecs", "input", "log", "message", "event.original"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
